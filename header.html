<header class="site-header">
    <div class="header-container">
        <a class="brand" href="index.html" aria-label="Blitzhack home">
            <span class="brand-mark">
                <img src="assets/images/Blitzhack_logo.png" alt="Blitzhack logo">
            </span>
            <span class="brand-copy">
                <span class="brand-name">Blitzhack</span>
                <span class="brand-tag">CTF collective</span>
            </span>
        </a>

        <button class="mobile-menu-btn" id="mobile-menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="nav-links" id="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="members.html" class="nav-link">Members</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>

        <a href="contact.html" class="header-cta">Join the crew</a>
    </div>
</header>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            const linkPage = link.getAttribute('href');
            if (linkPage === currentPage) {
                link.classList.add('active');
            }
        });

        const mobileMenuBtn = document.getElementById('mobile-menu-toggle');
        const navLinksElement = document.getElementById('nav-links');

        if (!mobileMenuBtn || !navLinksElement) {
            return;
        }

        mobileMenuBtn.addEventListener('click', function() {
            const isOpen = navLinksElement.classList.toggle('active');
            mobileMenuBtn.setAttribute('aria-expanded', String(isOpen));

            const icon = mobileMenuBtn.querySelector('i');
            icon.classList.toggle('fa-bars', !isOpen);
            icon.classList.toggle('fa-times', isOpen);
        });
    });
</script>
